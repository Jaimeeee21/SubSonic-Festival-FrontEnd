<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SUBSONIC Festival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <span class="logo-icon">🎵</span>
                <span class="logo-text">SUBSONIC</span>
            </a>
        </div>
    </nav>

    <!-- Contenedor de Login/Registro -->
    <section class="auth-section">
        <div class="auth-container">
            <!-- Formulario de Login -->
            <div class="auth-form" id="loginForm">
                <h2>Iniciar Sesión</h2>
                <form>
                    <div class="form-group">
                        <label for="loginEmail">Correo Electrónico:</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Contraseña:</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
                <p class="toggle-auth">¿No tienes cuenta? <span onclick="toggleForms()">Crea una aquí</span></p>
            </div>

            <!-- Formulario de Registro -->
            <div class="auth-form hidden" id="registerForm">
                <h2>Crear Cuenta</h2>
                <form>
                    <div class="form-group">
                        <label for="registerName">Nombre Completo:</label>
                        <input type="text" id="registerName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Correo Electrónico:</label>
                        <input type="email" id="registerEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Contraseña:</label>
                        <input type="password" id="registerPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword2">Confirmar Contraseña:</label>
                        <input type="password" id="registerPassword2" name="password2" required>
                    </div>
                    <button type="submit" class="btn-primary">Crear Cuenta</button>
                </form>
                <p class="toggle-auth">¿Ya tienes cuenta? <span onclick="toggleForms()">Inicia sesión</span></p>
                <div class="business-link-section">
                    <p class="business-text">¿Eres una empresa? <a href="business-register.html" class="link-blue">Regístrate como colaborador</a></p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
